<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Vishal Portfolio</title>
    <!-- Google Font & Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <!-- Ambient Glow Spheres -->
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <div class="login-wrapper">
        <div class="login-container glass-card">
            <div class="login-header">
                <a href="dashboard.html" class="logo" style="margin-bottom: 15px; display: inline-block;">VP.</a>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to securely manage your portfolio.</p>
            </div>
            
            <form id="loginform">
                <div class="form-group">
                    <label>Login As</label>
                    <select class="form-control" name="role" required>
                        <option value="user">Public Viewer (Guest)</option>
                        <option value="admin">Portfolio Administrator (Admin)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Username / Email</label>
                    <input type="text" class="form-control" name="username" placeholder="E.g., admin (or your email)" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Password (Use 'admin' for Admin mode)" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                    Sign In Securely <i class="fas fa-arrow-right"></i>
                </button>
                
                <div class="login-footer-info">
                    <p class="muted">New user? <a href="#" onclick="showDemoCredentials(event)">View Demo Access Info</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Core State & Logic -->
    <script src="app.js"></script>
    <script>
        // Form Submission Logic
        document.getElementById("loginform").addEventListener("submit", function(e) {
            e.preventDefault();
            const role = this.role.value;
            const username = this.username.value.trim();
            const password = this.password.value.trim();
            
            if (role === "admin") {
                if (username.toLowerCase() === "admin" && password === "admin") {
                    localStorage.setItem("portfolio_isAdmin", "true");
                    showToast("Login successful! Welcome back, Admin.", "success");
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1200);
                } else {
                    showToast("Invalid admin credentials. (Hint: username 'admin', password 'admin')", "error");
                }
            } else {
                localStorage.setItem("portfolio_isAdmin", "false");
                showToast(`Signed in successfully as "${username}" (Viewer Mode).`, "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1200);
            }
        });

        function showDemoCredentials(e) {
            e.preventDefault();
            showToast("Demo Admin Credentials: Username 'admin', Password 'admin'.", "info");
        }
    </script>
</body>
</html>
