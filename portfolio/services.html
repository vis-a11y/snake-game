<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Services - Vishal Portfolio</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="services.css">
</head>
<body>

    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress"></div>

    <!-- Header (Dynamically Injected via app.js) -->
    <header id="header"></header>

    <!-- Services Section -->
    <section id="services">
        
        <div class="services-wrapper">
            <div class="service-heading">
                <h4>Core Expertise</h4>
                <h2 class="gradient-text">What I Provide</h2>
            </div>
            
            <!-- Service Addition Form (Only visible to Admin) -->
            <div class="service-form glass-card" style="display: none;">
                <h3><i class="fas fa-plus-circle"></i> Add New Service</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="serviceTitle">Service Title</label>
                        <input type="text" id="serviceTitle" class="form-control" placeholder="E.g., Mobile App Development">
                    </div>
                    
                    <div class="form-group">
                        <label for="serviceIcon">Representing Icon</label>
                        <select id="serviceIcon" class="form-control">
                            <option value="fa-solid fa-code">⌨️ Code Icon (fa-code)</option>
                            <option value="fa-solid fa-laptop-code">💻 Laptop Code Icon (fa-laptop-code)</option>
                            <option value="fa-solid fa-database">🗄️ Database Icon (fa-database)</option>
                            <option value="fa-solid fa-mobile-screen-button">📱 Mobile Screen Icon (fa-mobile-screen-button)</option>
                            <option value="fa-solid fa-shield-halved">🛡️ Shield Security Icon (fa-shield-halved)</option>
                            <option value="fa-solid fa-cloud">☁️ Cloud Icon (fa-cloud)</option>
                            <option value="fa-solid fa-chart-line">📈 Analytics Graph Icon (fa-chart-line)</option>
                            <option value="fa-solid fa-envelope">✉️ Message Envelope Icon (fa-envelope)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="serviceDescription">Short Card Description</label>
                    <textarea id="serviceDescription" class="form-control" placeholder="Write a short summary (1-2 sentences) of this service..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="serviceDetails">Detailed \"Read More\" Explanation</label>
                    <textarea id="serviceDetails" class="form-control" placeholder="Provide detailed tools, workflows, or frameworks covered under this service (shown when clicking Read More)..."></textarea>
                </div>
                
                <button onclick="addService()" class="btn btn-primary" style="align-self: flex-start; margin-top: 10px;">
                    <i class="fas fa-plus"></i> Add Service
                </button>
            </div>
            
            <!-- Dynamic Services Container -->
            <div id="services-container" class="services-container"></div>
        </div>
    </section>

    <!-- Core Controller Scripts -->
    <script src="app.js"></script>
</body>
</html>
