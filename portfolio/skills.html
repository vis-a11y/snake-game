<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills - Vishal Portfolio</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="skills.css">
</head>
<body>

    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress"></div>

    <!-- Header (Dynamically Injected via app.js) -->
    <header id="header"></header>

    <!-- Skills Section -->
    <section id="skills">
        
        <div class="skills-wrapper">
            <div class="skills-heading">
                <h4>My Level of Expertise</h4>
                <h2 class="gradient-text">Professional Skills</h2>
            </div>
            
            <!-- Add Skill Form (Only visible to Admin) -->
            <div class="skill-form glass-card" style="display: none;">
                <h3><i class="fas fa-plus-circle"></i> Add New Skill</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="skillName">Skill Name</label>
                        <input type="text" id="skillName" class="form-control" placeholder="E.g., GraphQL, PyTorch">
                    </div>
                    
                    <div class="form-group">
                        <label for="skillPercent">Proficiency Percentage</label>
                        <input type="number" id="skillPercent" class="form-control" min="0" max="100" placeholder="E.g., 85">
                    </div>
                </div>
                <button onclick="addSkill()" class="btn btn-primary" style="margin-top: 10px;">
                    <i class="fas fa-plus"></i> Add Skill
                </button>
            </div>
            
            <!-- Skills Container Grid (Populated dynamically) -->
            <div id="skills-container"></div>
        </div>

    </section>

    <!-- Core Controller Scripts -->
    <script src="app.js"></script>
</body>
</html>
