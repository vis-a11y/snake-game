<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="game-wrapper">
        <div class="infos">
          <div class="info">
            <h3>High Score: <span id="high-score">0</span></h3>
          </div>
          <div class="info">
            <h3>Score: <span id="score">0</span></h3>
          </div>
          <div class="info">
            <h3>Time: <span id="time">00:00</span></h3>
          </div>
        </div>

        <div class="board" aria-label="Snake game board"></div>
      </section>

      <div class="modal" id="game-modal">
        <div class="modal-panel start-game">
          <h3>Welcome to Snake Game</h3>
          <button class="btn start-btn" type="button">Start Game</button>
        </div>
        <div class="modal-panel game-over">
          <h3>Game Over</h3>
          <button class="btn restart-btn" type="button">Restart Game</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
